<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050408;--surface:#0a0810;--card:#0e0b16;--border:#ffffff08;--purple:#6d28d9;--violet:#8b5cf6;--glow:#a78bfa;--white:#ede9fe;--muted:#6b5f8a;--green:#22c55e;}
body{background:var(--bg);color:var(--white);font-family:'Space Grotesk',sans-serif;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:1.3rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(5,4,8,.95);position:sticky;top:0;z-index:10}
.logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:6px}
.admin-tag{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:var(--violet);font-size:.62rem;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;text-transform:uppercase}
.back-link{color:var(--muted);font-size:.72rem;text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color .2s}
.back-link:hover{color:var(--white)}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2.5rem;background:var(--surface)}
.tab{padding:.9rem 1.5rem;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.tab.active{color:var(--white);border-bottom-color:var(--violet)}
.tab:hover{color:var(--white)}
.container{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
.panel{display:none}.panel.active{display:block}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.3rem}
.stat-label{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--glow)}

/* Form */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.8rem;margin-bottom:2rem}
.form-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:2px;margin-bottom:1.3rem;color:var(--violet);text-transform:uppercase}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.fg{display:flex;flex-direction:column;gap:.35rem}
.fg label{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.fg input,.fg select{background:var(--surface);border:1px solid var(--border);color:var(--white);padding:.65rem .9rem;font-family:'Space Grotesk',sans-serif;font-size:.88rem;outline:none;border-radius:7px;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--violet)}
.fg select option{background:var(--surface)}
.submit-btn{background:var(--violet);color:white;border:none;padding:.8rem 2rem;font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:7px;transition:opacity .2s}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* List */
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.list-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:1px}
.count-tag{font-size:.72rem;color:var(--muted)}
.product-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 1.3rem;display:flex;align-items:center;gap:1.2rem;margin-bottom:.7rem;transition:border-color .2s}
.product-row:hover{border-color:rgba(139,92,246,.2)}
.row-emoji{font-size:1.7rem;min-width:34px;text-align:center}
.row-info{flex:1}
.row-name{font-weight:600;font-size:.88rem;margin-bottom:.15rem}
.row-meta{font-size:.72rem;color:var(--muted)}
.row-price{font-size:.95rem;font-weight:700;color:var(--glow);min-width:55px;text-align:right}
.del-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;font-size:.65rem;cursor:pointer;letter-spacing:1px;font-family:'Space Grotesk',sans-serif;transition:all .2s;border-radius:5px;text-transform:uppercase}
.del-btn:hover{border-color:#f87171;color:#f87171}

/* Orders */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.5rem}
.order-id{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.3rem}
.order-customer{font-weight:600;font-size:.9rem}
.order-contact{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.order-total{font-size:1.1rem;font-weight:700;color:var(--glow)}
.order-items{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.order-item{display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--muted)}
.order-item strong{color:var(--white)}
.order-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.order-addr{font-size:.72rem;color:var(--muted)}
.status-sel{background:var(--surface);border:1px solid var(--border);color:var(--white);padding:.4rem .8rem;font-family:'Space Grotesk',sans-serif;font-size:.72rem;outline:none;cursor:pointer;border-radius:5px}
.status-sel:focus{border-color:var(--violet)}

.empty-state{text-align:center;color:var(--muted);padding:3rem;border:1px dashed rgba(139,92,246,.15);border-radius:10px;font-size:.85rem;letter-spacing:.5px}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--purple);color:white;padding:.8rem 1.5rem;font-size:.78rem;font-weight:600;letter-spacing:1px;opacity:0;transition:opacity .3s;z-index:999;border-radius:7px}
.toast.show{opacity:1}
.toast.err{background:#dc2626}

@media(max-width:600px){.form-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.tabs,.header{padding-left:1.2rem;padding-right:1.2rem}.container{padding:1.5rem 1.2rem}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:1rem">
    <div class="logo">NOIR</div>
    <span class="admin-tag">Admin</span>
  </div>
  <a href="noir-index.html" class="back-link">← Store</a>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('products')">Products</div>
  <div class="tab" onclick="switchTab('orders')">Orders <span id="ordersBadge"></span></div>
</div>

<div class="container">

  <div class="panel active" id="panel-products">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Products</div><div class="stat-val" id="statProducts">0</div></div>
      <div class="stat-card"><div class="stat-label">Orders</div><div class="stat-val" id="statOrders">0</div></div>
      <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-val" id="statRevenue">$0</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val" id="statPending">0</div></div>
    </div>

    <div class="add-form">
      <div class="form-title">Add Product</div>
      <div class="form-grid">
        <div class="fg"><label>Name</label><input type="text" id="pName" placeholder="e.g. Shadow Hoodie"></div>
        <div class="fg"><label>Category</label>
          <select id="pCat"><option>Hoodie</option><option>T-Shirt</option><option>Bottoms</option><option>Jacket</option><option>Accessories</option><option>Shoes</option></select>
        </div>
        <div class="fg"><label>Price ($)</label><input type="number" id="pPrice" placeholder="e.g. 95" min="0"></div>
        <div class="fg"><label>Emoji</label><input type="text" id="pEmoji" placeholder="🖤" maxlength="2"></div>
        <div class="fg"><label>Badge</label>
          <select id="pBadge"><option value="">None</option><option>New</option><option>Hot</option><option>Sale</option><option>Limited</option></select>
        </div>
      </div>
      <button class="submit-btn" id="addBtn" onclick="addProduct()">Add Product</button>
    </div>

    <div class="list-header">
      <div class="list-title">All Products</div>
      <span class="count-tag" id="productCount"></span>
    </div>
    <div id="productsList"><div class="empty-state">Loading...</div></div>
  </div>

  <div class="panel" id="panel-orders">
    <div class="list-header" style="margin-bottom:1.5rem">
      <div class="list-title">All Orders</div>
      <span class="count-tag" id="ordersCount"></span>
    </div>
    <div id="ordersList"><div class="empty-state">Loading orders...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6vVf6o9aG6sQf2tZ-AkvDNkSDgavH6Ic",
  authDomain: "drip-store-838b7.firebaseapp.com",
  projectId: "drip-store-838b7",
  storageBucket: "drip-store-838b7.firebasestorage.app",
  messagingSenderId: "344998294552",
  appId: "1:344998294552:web:4b99b2c423241591447f6d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let products = [], orders = [];

onSnapshot(collection(db, 'noir_products'), snap => {
  products = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderProducts();
  document.getElementById('statProducts').textContent = products.length;
  document.getElementById('productCount').textContent = `${products.length} item${products.length!==1?'s':''}`;
});

onSnapshot(query(collection(db, 'noir_orders'), orderBy('createdAt','desc')), snap => {
  orders = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderOrders();
  const revenue = orders.reduce((s,o) => s + (o.total||0), 0);
  const pending = orders.filter(o => o.status === 'pending').length;
  document.getElementById('statOrders').textContent = orders.length;
  document.getElementById('statRevenue').textContent = `$${revenue.toFixed(0)}`;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('ordersCount').textContent = `${orders.length} order${orders.length!==1?'s':''}`;
  document.getElementById('ordersBadge').textContent = orders.length > 0 ? `(${orders.length})` : '';
});

function renderProducts() {
  const list = document.getElementById('productsList');
  if (!products.length) { list.innerHTML = '<div class="empty-state">No products yet.</div>'; return; }
  list.innerHTML = products.map(p => `
    <div class="product-row">
      <div class="row-emoji">${p.emoji||'👕'}</div>
      <div class="row-info">
        <div class="row-name">${p.name} ${p.badge?`<span style="background:var(--purple);color:white;font-size:.55rem;padding:2px 6px;border-radius:3px;font-weight:700">${p.badge}</span>`:''}</div>
        <div class="row-meta">${p.category}</div>
      </div>
      <div class="row-price">$${p.price}</div>
      <button class="del-btn" onclick="window.delProduct('${p.id}')">Delete</button>
    </div>`).join('');
}

function renderOrders() {
  const list = document.getElementById('ordersList');
  if (!orders.length) { list.innerHTML = '<div class="empty-state">No orders yet. Share your store!</div>'; return; }
  list.innerHTML = orders.map(o => {
    const date = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleDateString('en-AE',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Just now';
    return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-id">#${o.id.slice(-8).toUpperCase()} · ${date}</div>
          <div class="order-customer">${o.customer?.name||'Unknown'}</div>
          <div class="order-contact">${o.customer?.email||''} ${o.customer?.phone?'· '+o.customer.phone:''}</div>
        </div>
        <div class="order-total">$${o.total?.toFixed(2)}</div>
      </div>
      <div class="order-items">
        ${(o.items||[]).map(i=>`<div class="order-item"><span>${i.emoji||'👕'}</span><strong>${i.name}</strong><span>x${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
      </div>
      <div class="order-bottom">
        <div class="order-addr">📍 ${o.customer?.address||'No address'}</div>
        <select class="status-sel" onchange="window.updateStatus('${o.id}',this.value)">
          <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
        </select>
      </div>
    </div>`;
  }).join('');
}

window.addProduct = async () => {
  const name = document.getElementById('pName').value.trim();
  const category = document.getElementById('pCat').value;
  const price = parseFloat(document.getElementById('pPrice').value);
  const emoji = document.getElementById('pEmoji').value.trim() || '🖤';
  const badge = document.getElementById('pBadge').value || null;
  if (!name || !price) { showToast('Fill in name and price!', true); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    await addDoc(collection(db,'noir_products'),{name,category,price,emoji,badge});
    ['pName','pPrice','pEmoji'].forEach(id => document.getElementById(id).value='');
    document.getElementById('pBadge').value='';
    showToast('Product added!');
  } catch(e) { showToast('Error',true); }
  btn.disabled = false; btn.textContent = 'Add Product';
};

window.delProduct = async (id) => {
  if (!confirm('Delete this product?')) return;
  try { await deleteDoc(doc(db,'noir_products',id)); showToast('Deleted'); }
  catch(e) { showToast('Error',true); }
};

window.updateStatus = async (id, status) => {
  try { await updateDoc(doc(db,'noir_orders',id),{status}); showToast(`Updated to ${status}`); }
  catch(e) { showToast('Error',true); }
};

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  setTimeout(() => t.className='toast', 2500);
}

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',['products','orders'][i]===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
};
</script>
</body>
</html>
